<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1e1e2a, #0a0a0f);
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2rem;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 4px;
      opacity: 0.8;
    }

    .buttons {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-btn {
      display: inline-block;
      padding: 1.2rem 3rem;
      border-radius: 60px;
      background: #2a2a3a;
      color: white;
      font-size: 1.8rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
      transition: 0.25s ease;
      border: 2px solid transparent;
      min-width: 220px;
      text-align: center;
    }

    .mode-btn:hover {
      transform: translateY(-6px) scale(1.02);
      background: #3a3a52;
      border-color: #7a7aff;
    }

    .mode-btn.team {
      background: #2a3a5a;
    }
    .mode-btn.team:hover {
      background: #3a5a7a;
      border-color: #5a9aff;
    }

    .mode-btn.individual {
      background: #3a2a5a;
    }
    .mode-btn.individual:hover {
      background: #5a3a7a;
      border-color: #b07aff;
    }

    .sub {
      margin-top: 1rem;
      opacity: 0.5;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h1>point_counter</h1>
  <div class="buttons">
    <a href="TeamPointCount/index.html" class="mode-btn team">Team Points</a>
    <a href="IndividualCount/index.html" class="mode-btn individual">Individual Points</a>
  </div>
  <p class="sub">waffletoffle98</p>
</body>
</html>
